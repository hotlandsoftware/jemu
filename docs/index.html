<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEMU</title>
    <style>
        body {
            font-family: monospace;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        main {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 3rem; margin-bottom: 0.25rem; }
        p { color: #8b949e; margin: 0.5rem 0; }
        .warning {
            display: inline-block;
            margin-top: 1.5rem;
            background: #3d1f00;
            color: #f0883e;
            border: 1px solid #f0883e44;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main>
        <h1>JEMU</h1>
        <p>A generic emulator for as many machines as possible.</p>
        <p><a href="https://github.com/hotlandsoftware/jemu">GitHub</a></p>
        <div class="warning">⚠ Currently unstable — not suitable for production use.</div>
    </main>
</body>
</html>
