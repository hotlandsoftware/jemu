<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMU | Home</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f4f0;
            --surface: #ffffff;
            --border: #d0cfc8;
            --text: #1a1a18;
            --muted: #6b6b60;
            --accent: #c0392b;
            --badge-ok: #2e7d32;
            --badge-warn: #b45309;
            --badge-no: #7f7f7f;
            --font: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── Nav ── */
        nav {
            background: var(--text);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0 1rem;
            border-bottom: 2px solid var(--accent);
        }
        nav .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 0.6rem 1rem 0.6rem 0;
            color: #fff;
            text-decoration: none;
            border-right: 1px solid #333;
            margin-right: 0.5rem;
        }
        nav a {
            color: #ccc;
            text-decoration: none;
            padding: 0.6rem 0.75rem;
            font-size: 0.85rem;
            transition: color 0.1s;
        }
        nav a:hover { color: #fff; }
        nav .spacer { flex: 1; }
        nav .gh-link {
            font-size: 0.8rem;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 0.3rem 0.7rem;
        }
        nav .gh-link:hover { border-color: #aaa; }

        /* ── Layout ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* ── Hero ── */
        .hero {
            background: var(--text);
            color: #e0e0d8;
            padding: 2rem 0;
            border-bottom: 1px solid #333;
        }
        .hero .container { display: flex; gap: 2rem; align-items: flex-start; }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #fff;
            margin-bottom: 0.4rem;
        }
        .hero p { color: #9a9a8e; max-width: 520px; font-size: 0.9rem; }

        /* ── Filter bar ── */
        .filter-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 0;
        }
        .filter-bar .container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-bar label { font-size: 0.8rem; color: var(--muted); margin-right: 0.25rem; }
        .filter-bar select, .filter-bar input[type=search] {
            font-family: var(--font);
            font-size: 0.82rem;
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: var(--bg);
            color: var(--text);
        }
        .filter-bar input[type=search] { width: 180px; }
        #result-count { margin-left: auto; font-size: 0.8rem; color: var(--muted); }

        /* ── Table ── */
        .table-wrap {
            overflow-x: auto;
            padding: 1.25rem 0 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.83rem;
        }
        thead th {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            text-align: left;
            padding: 0.5rem 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            user-select: none;
        }
        thead th:hover { color: var(--text); }
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.08s;
        }
        tbody tr:hover { background: #eeede8; }
        tbody td { padding: 0.55rem 0.75rem; vertical-align: top; }
        td.name { font-weight: 600; }
        td.name a { color: var(--text); text-decoration: none; }
        td.name a:hover { color: var(--accent); }
        td.notes { color: var(--muted); font-size: 0.78rem; max-width: 240px; }
        td.roms { font-family: monospace; font-size: 0.75rem; color: #555; max-width: 200px; word-break: break-all; }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .badge-ok  { background: #e8f5e9; color: var(--badge-ok); }
        .badge-partial { background: #fff3e0; color: var(--badge-warn); }
        .badge-no  { background: #f0f0ee; color: var(--badge-no); }
        .dot { font-size: 1rem; vertical-align: middle; }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 1rem 0;
            font-size: 0.78rem;
            color: var(--muted);
            text-align: center;
        }
        footer a { color: var(--muted); }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="#">GEMU</a>
    <a href="/">Home</a>
    <a href="https://github.com/hotlandsoftware/gemu/blob/main/MONITOR.md">Monitor</a>
    <span class="spacer"></span>
    <a class="gh-link" href="https://github.com/hotlandsoftware/gemu">GitHub ↗</a>
</nav>

<div class="hero">
    <div class="container">
        <div>
            <h1>GEMU</h1>
            <p><i>A generic multi-machine emulator</i></p>
        </div>
    </div>
</div>

<div class="filter-bar">
    <div class="container">
        <label>Core</label>
        <select id="filter-core">
            <option value="">All</option>
            <option value="gemu-rca">gemu-rca</option>
            <option value="gemu-chip8">gemu-chip8</option>
        </select>
        <label>CPU</label>
        <select id="filter-cpu">
            <option value="">All</option>
            <option value="RCA CDP1802">RCA CDP1802</option>
            <option value="CHIP-8">CHIP-8</option>
        </select>
        <input type="search" id="filter-search" placeholder="Search machines…">
        <span id="result-count"></span>
    </div>
</div>

<div class="container">
    <div class="table-wrap">
        <table id="machine-table">
            <thead>
                <tr>
                    <th data-col="name">Machine</th>
                    <th data-col="year">Year</th>
                    <th data-col="cpu">CPU</th>
                    <th data-col="core">Core</th>
                    <th data-col="status">Status</th>
                    <th data-col="gfx">GFX</th>
                    <th data-col="sound">Sound</th>
                    <th class="notes" data-col="notes">Notes</th>
                </tr>
            </thead>
            <tbody id="machine-tbody"></tbody>
        </table>
    </div>
</div>

<footer>
    <div class="container">
        <a href="https://github.com/hotlandsoftware/gemu">Source on GitHub</a>
    </div>
</footer>

<script>
function badge(ok) {
    return ok ? '<span class="badge badge-ok">Yes</span>' : '<span class="badge badge-no">No</span>';
}
function statusBadge(s) {
    if (s === "working") return '<span class="badge badge-ok">Working</span>';
    if (s === "partial") return '<span class="badge badge-partial">Partial</span>';
    return '<span class="badge badge-no">' + s + '</span>';
}

let ALL = [];

function render(list) {
    const tbody = document.getElementById("machine-tbody");
    tbody.innerHTML = list.map(m => `
        <tr>
            <td class="name"><a href="machines/${m.alias}.html">${m.name}</a></td>
            <td>${m.year}</td>
            <td>${m.cpu}</td>
            <td>${m.core}</td>
            <td>${statusBadge(m.status)}</td>
            <td>${badge(m.gfx)}</td>
            <td>${badge(m.sound)}</td>
            <td class="notes">${m.notes}</td>
        </tr>`).join("");
    document.getElementById("result-count").textContent =
        list.length === ALL.length ? "" : list.length + " result" + (list.length === 1 ? "" : "s");
}

function filter() {
    const core   = document.getElementById("filter-core").value;
    const cpu    = document.getElementById("filter-cpu").value;
    const search = document.getElementById("filter-search").value.toLowerCase();
    render(ALL.filter(m =>
        (!core   || m.core === core) &&
        (!cpu    || m.cpu  === cpu)  &&
        (!search || m.name.toLowerCase().includes(search) || m.notes.toLowerCase().includes(search))
    ));
}

document.getElementById("filter-core").addEventListener("change", filter);
document.getElementById("filter-cpu").addEventListener("change", filter);
document.getElementById("filter-search").addEventListener("input", filter);

fetch("machines.json")
    .then(r => r.json())
    .then(data => {
        ALL = data.sort((a, b) => a.name.localeCompare(b.name));
        render(ALL);
    });
</script>
</body>
</html>
