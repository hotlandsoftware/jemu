name: Build & Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git gcc make musl-dev \
            sdl2-dev \
            ncurses-dev ncurses-static \
            alsa-lib-dev \
            libx11-dev libxext-dev \
            libxcursor-dev libxi-dev libxrandr-dev \
            libxxf86vm-dev \
            libxcb-dev mesa-dev libdrm-dev \
            eudev-dev

      - uses: actions/checkout@v4

      - name: Build static binaries
        run: |
          make \
            SDL2_LIBS="$(pkg-config --static --libs sdl2 2>/dev/null || sdl2-config --static-libs)" \
            EXTRA_LDFLAGS="-static"

      - name: Package
        run: tar czf jemu-linux-x86_64.tar.gz -C bin jemu-chip8 jemu-rca

      - name: Upload artifact (PRs)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: jemu-linux-x86_64
          path: jemu-linux-x86_64.tar.gz
          retention-days: 7

      - name: Release (rolling pre-release)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: jemu
          prerelease: true
          body: "This is an unstable build of jemu that is not suitable for production yet."
          files: jemu-linux-x86_64.tar.gz
