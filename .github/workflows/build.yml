name: Build & Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git gcc make musl-dev \
            sdl2-dev \
            ncurses-dev ncurses-static \
            alsa-lib-dev \
            libx11-dev libxext-dev \
            libxcursor-dev libxi-dev libxrandr-dev \
            libxxf86vm-dev \
            libxcb-dev mesa-dev libdrm-dev \
            eudev-dev

      - uses: actions/checkout@v4

      - name: Build static binaries
        run: |
          make \
            SDL2_LIBS="$(pkg-config --static --libs sdl2 2>/dev/null || sdl2-config --static-libs)" \
            EXTRA_LDFLAGS="-static"

      - name: Package
        run: tar czf gemu-linux-x86_64.tar.gz -C bin gemu-chip8 gemu-rca gemu-mos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemu-linux-x86_64
          path: gemu-linux-x86_64.tar.gz
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-SDL2

      - name: Build
        run: make

      - name: Gather runtime DLLs
        run: |
          for exe in bin/*.exe; do
            { ldd "$exe" 2>/dev/null || true; } | awk '/mingw64/{print $3}' | while IFS= read -r dll; do
              cp -n "$dll" bin/ 2>/dev/null || true
            done
          done

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path bin\* -DestinationPath gemu-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemu-windows-x86_64
          path: gemu-windows-x86_64.zip
          retention-days: 7

  release:
    needs: [build-linux, build-windows]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gemu-linux-x86_64
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: gemu-windows-x86_64
          path: .

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: gemu
          prerelease: true
          body: "This is an unstable build of gemu that is not suitable for production yet."
          files: |
            gemu-linux-x86_64.tar.gz
            gemu-windows-x86_64.zip
